spring.application.name=usage-service
server.port=8082

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

rabbitmq.queue.name=energy-queue

spring.datasource.url=jdbc:postgresql://localhost:5432/energydb
spring.datasource.username=admin
spring.datasource.password=admin

# Hibernate (JPA) schaut sich deine @Entity Klassen an
# → und baut daraus Tabellen in PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true